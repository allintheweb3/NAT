<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多链多钱包智能资产看板 (全端全居中直连修复版)</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
body { background: #0f172a; color: #f1f5f9; padding: 30px 15px; }
.container { max-width: 1200px; margin: 0 auto; }

/* 头部主副标题：全端绝对居中 */
.header { text-align: center; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.header h1 { color: #38bdf8; font-size: 26px; margin-bottom: 8px; text-align: center; }
.header p { color: #64748b; font-size: 14px; text-align: center; }

/* 顶栏资产汇总栏：全端全自适应全居中 */
.summary-banner { background: linear-gradient(135deg, #1e1b4b, #2e1065); border: 1px solid #4c1d95; padding: 25px; border-radius: 12px; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 15px; }
.summary-left { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
.summary-left h3 { font-size: 14px; color: #a78bfa; margin-bottom: 8px; text-align: center; }
.summary-left .total-val { font-size: 38px; font-weight: 800; color: #10b981; font-family: monospace; word-break: break-all; text-align: center; line-height: 1.2; }
.summary-right { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; width: 100%; }
.select-token-ui { padding: 10px 20px; font-size: 16px; font-weight: bold; color: #38bdf8; border: 2px solid #38bdf8; background: #0f172a; border-radius: 8px; cursor: pointer; width: 100%; max-width: 280px; text-align: center; text-align-last: center; }
.wallet-count-badge { font-size: 12px; color: #94a3b8; background: rgba(255,255,255,0.05); padding: 4px 15px; border-radius: 20px; border: 1px solid #334155; display: inline-block; }

/* 左右布局（宽屏下应用） */
.main-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }

/* 卡片容器 */
.card-box { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 25px; }
.card-header-toggle { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
.card-title { font-size: 16px; color: #38bdf8; font-weight: bold; border-left: 4px solid #38bdf8; padding-left: 10px; display: flex; align-items: center; justify-content: space-between; width: 100%; }
.toggle-icon { font-size: 12px; color: #64748b; transition: transform 0.2s; }
.toggle-content { margin-top: 15px; }
.toggle-content.collapsed { display: none; }

/* 表单与输入框 */
.form-grid { display: flex; flex-direction: column; gap: 12px; }
.form-row-inline { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
input, select, button { padding: 10px 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #fff; font-size: 14px; outline: none; }
input:focus, select:focus { border-color: #38bdf8; }
button { background: #2563eb; cursor: pointer; border: none; font-weight: bold; transition: background 0.2s; }
button:hover { background: #3b82f6; }
button.btn-success { background: #10b981; }
button.btn-success:hover { background: #059669; }
button.btn-danger { background: #ef4444; padding: 4px 8px; font-size: 12px; }
button.btn-danger:hover { background: #dc2626; }

/* 监控明细表 */
.table-container { overflow-x: auto; background: #1e293b; border-radius: 12px; border: 1px solid #334155; }
table { width: 100%; border-collapse: collapse; text-align: left; }
th, td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid #334155; }
th { background: #334155; color: #38bdf8; font-weight: 600; }
tr:hover td { background: rgba(51, 65, 85, 0.3); }
td.index-cell { font-family: monospace; color: #64748b; font-weight: bold; text-align: center; width: 50px; }
td.address-cell { font-family: monospace; color: #cbd5e1; word-break: break-all; }
td.remark-cell { color: #e2e8f0; font-weight: 500; }
td.balance-cell { font-family: monospace; font-weight: bold; text-align: right; }

.chain-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
.badge-ETH { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid #6366f1; }
.badge-BSC { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid #f59e0b; }
.badge-SOL { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #10b981; }

/* 代币列表管理样式 */
.token-item { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #334155; }
.token-item-info h4 { font-size: 14px; color: #fff; }
.token-item-info p { font-size: 11px; color: #64748b; font-family: monospace; word-break: break-all; margin-top: 2px; }

/* 移动端断点适配 */
@media (max-width: 768px) {
    body { padding: 15px 10px; }
    .header h1 { font-size: 22px; }
    .summary-left .total-val { font-size: 30px; }
    .select-token-ui { max-width: 100%; }
    .main-layout { grid-template-columns: 1fr; }
    .form-row-inline { grid-template-columns: 1fr; gap: 8px; }
}
</style>
</head>
<body>

<div class="container">
    <!-- 头部主副标题（全端自动居中） -->
    <div class="header">
        <h1>多链多钱包智能资产看板</h1>
        <p>动态添加代币 | 多钱包合并计算 | 跨域容错高兼容链上通信架构</p>
    </div>

    <!-- 资产汇总栏（全端自动居中） -->
    <div class="summary-banner">
        <div class="summary-left">
            <h3>当前所选代币全网监控总额</h3>
            <p class="total-val" id="summary_total_display">0.00</p>
        </div>
        <div class="summary-right">
            <select id="selectDisplayToken" class="select-token-ui" onchange="renderUI()">
                <!-- 动态代币选项 -->
            </select>
            <div class="wallet-count-badge">正在监控 <span id="summary_wallet_count" style="color:#38bdf8;font-weight:bold;">0</span> 个钱包</div>
        </div>
    </div>

    <div class="main-layout">
        <!-- 左侧：钱包监控明细与表单 -->
        <div>
            <!-- 添加监控钱包表单 -->
            <div class="card-box">
                <div class="card-title">监控钱包添加</div>
                <div style="margin-top:15px;">
                    <div class="form-row-inline">
                        <input type="text" id="walletAddress" placeholder="输入钱包地址 (0x... 或 SOL地址)" />
                        <input type="text" id="walletRemark" placeholder="钱包备注(如：巨鲸1号)" />
                        <select id="walletChain">
                            <option value="ETH">Ethereum 链</option>
                            <option value="BSC">BNB Smart Chain</option>
                            <option value="SOL">Solana 链</option>
                        </select>
                    </div>
                    <button class="btn-success" style="width:100%;" onclick="addWallet()">➕ 确认添加此钱包到观察队列</button>
                </div>
            </div>

            <!-- 钱包资产明细表 -->
            <div class="card-box" style="padding: 0; overflow: hidden;">
                <div style="padding: 15px 20px 5px 20px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap;">
                    <div class="card-title" style="margin: 0; border:none; padding:0;">钱包明细清单</div>
                    <button onclick="updateAllBalances()" id="refreshBtn">🔄 一键拉取实时链上余额</button>
                </div>
                <div style="overflow-x: auto; width: 100%;">
                    <table style="margin-top: 10px; min-width: 600px;">
                        <thead>
                            <tr>
                                <th style="text-align: center; width: 50px;">序号</th>
                                <th style="width: 80px;">网络</th>
                                <th style="width: 120px;">钱包备注</th>
                                <th>监控钱包地址</th>
                                <th style="text-align: right; width: 150px;" id="dynamicTableHeader">代币余额</th>
                                <th style="text-align: center; width: 80px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="walletTableBody">
                            <!-- 数据插槽 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 右侧：代币资产配置（折叠样式，默认为收起） -->
        <div>
            <!-- 添加自定义代币 (默认收起) -->
            <div class="card-box">
                <div class="card-header-toggle" onclick="toggleCard('addTokenContent', 'arrow1')">
                    <div class="card-title">
                        <span>🔧 自定义备查代币添加</span>
                        <span id="arrow1" class="toggle-icon">展开 ▼</span>
                    </div>
                </div>
                <div id="addTokenContent" class="toggle-content collapsed">
                    <div class="form-grid">
                        <div>
                            <label style="font-size:12px; color:#94a3b8;">代币简称 (Symbol)</label>
                            <input type="text" id="newTokenSymbol" placeholder="例如：USDT, NAT" style="width:100%; margin-top:4px;" />
                        </div>
                        <div>
                            <label style="font-size:12px; color:#94a3b8;">所属公链 (Chain)</label>
                            <select id="newTokenChain" style="width:100%; margin-top:4px;">
                                <option value="ETH">Ethereum (ERC20)</option>
                                <option value="BSC">BNB Smart Chain (BEP20)</option>
                                <option value="SOL">Solana Network (SPL)</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size:12px; color:#94a3b8;">代币智能合约/Mint地址</label>
                            <input type="text" id="newTokenContract" placeholder="EVM的0x地址 或 SOL的Mint公钥" style="width:100%; margin-top:4px;" />
                        </div>
                        <div>
                            <label style="font-size:12px; color:#94a3b8;">代币精度位 (Decimals)</label>
                            <input type="number" id="newTokenDecimals" value="18" min="0" max="18" style="width:100%; margin-top:4px;" />
                        </div>
                        <button onclick="addCustomToken()" style="margin-top:5px;">💾 录入并备查此代币</button>
                    </div>
                </div>
            </div>

            <!-- 已备查代币列表 (默认收起) -->
            <div class="card-box">
                <div class="card-header-toggle" onclick="toggleCard('listTokenContent', 'arrow2')">
                    <div class="card-title">
                        <span>📋 现已备查的代币资产</span>
                        <span id="arrow2" class="toggle-icon">展开 ▼</span>
                    </div>
                </div>
                <div id="listTokenContent" class="toggle-content collapsed">
                    <div id="customTokenListSlot">
                        <!-- 代币小卡片 -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ==================== 1. RPC 节点配置 ====================
// 【已修复】：更换 ETH 节点为高开放、高频无拦截的 MEV-Blocker 防阻断端点。BSC 节点保持原封不动。
const RPC_ETH = "https://rpc.mevblocker.io"; 
const RPC_BSC = "https://bsc-dataseed1.binance.org"; // 严格未动
const RPC_SOL = "https://api.mainnet-beta.solana.com"; 

// ==================== 2. 初始化缓存与示例数据 ====================
const INITIAL_TOKENS = [
    { symbol: "USDT", chain: "ETH", contract: "0xdac17f958d2ee523a2206206994597c13d831ec7", decimals: 6 },
    { symbol: "USDT", chain: "BSC", contract: "0x55d398326f99059ff775485246999027b3197955", decimals: 18 },
    { symbol: "NAT",  chain: "ETH", contract: "0x249130f5e2dd4cf278180c0df8273f3592ad1247", decimals: 18 },
    { symbol: "NAT",  chain: "BSC", contract: "0xedf9df5c987023f28d20dc81970f27841c968f3c", decimals: 18 },
    { symbol: "USDT", chain: "SOL", contract: "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB", decimals: 6 }
];

const INITIAL_WALLETS = [
    { chain: "ETH", remark: "V神钱包示例", address: "0xAb5801a7D398351b8bE11C439e05C5B3259aec9B", balances: {} },
    { chain: "BSC", remark: "币安热钱包示例", address: "0xF977814e90dA44bFA03b6295A0616a897441aceC", balances: {} },
    { chain: "SOL", remark: "SOL监控示例", address: "6ZRCB7v8gscuA2N6773FwYms48D6f4YfV2LnyfC8e96X", balances: {} }
];

let tokenConfigList = JSON.parse(localStorage.getItem("cfg_tokens")) || INITIAL_TOKENS;
let walletList = JSON.parse(localStorage.getItem("cfg_wallets")) || INITIAL_WALLETS;

// ==================== 3. 基础可折叠卡片组件逻辑 ====================
function toggleCard(contentId, arrowId) {
    const content = document.getElementById(contentId);
    const arrow = document.getElementById(arrowId);
    if(content.classList.contains('collapsed')) {
        content.classList.remove('collapsed');
        arrow.innerText = "收起 ▲";
    } else {
        content.classList.add('collapsed');
        arrow.innerText = "展开 ▼";
    }
}

// ==================== 4. 节点层跨域安全网络读取算法 ====================
async function queryEvmBalance(chain, walletAddr, tokenAddr, decimals) {
    try {
        const rpcUrl = (chain === "ETH") ? RPC_ETH : RPC_BSC;
        const cleanAddress = walletAddr.toLowerCase().replace("0x", "");
        const dataParam = "0x70a08231" + cleanAddress.padStart(64, "0");

        const response = await fetch(rpcUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                jsonrpc: "2.0",
                method: "eth_call",
                params: [{ to: tokenAddr, data: dataParam }, "latest"],
                id: Math.floor(Math.random() * 1000)
            })
        });
        const json = await response.json();
        if (json.result && json.result !== "0x") {
            const rawBalance = BigInt(json.result);
            return Number(rawBalance) / Math.pow(10, decimals);
        }
        return 0;
    } catch (e) {
        console.error(`[EVM ERROR] ${chain} -> ${walletAddr}:`, e);
        return 0;
    }
}

async function querySolanaBalance(walletAddr, tokenMint, decimals) {
    try {
        // 【已修复】：针对特定 SPL 节点返回，同时提取 uiAmount 变体和原始 amount，彻底排除冷门代币解析空值引发的不显示故障
        const response = await fetch(RPC_SOL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                jsonrpc: "2.0",
                id: Math.floor(Math.random() * 1000),
                method: "getTokenAccountsByOwner",
                params: [
                    walletAddr,
                    { mint: tokenMint },
                    { encoding: "jsonParsed" }
                ]
            })
        });
        const json = await response.json();
        let bal = 0;
        if (json.result && json.result.value && json.result.value.length > 0) {
            const parsedInfo = json.result.value[0].account.data.parsed.info.tokenAmount;
            
            if (parsedInfo.uiAmount !== null && parsedInfo.uiAmount !== undefined) {
                bal = parseFloat(parsedInfo.uiAmountString || parsedInfo.uiAmount);
            } else if (parsedInfo.amount) {
                // 回退保障：若无格式化数额，采用原始颗粒度除以精度位强行换算
                bal = Number(parsedInfo.amount) / Math.pow(10, decimals || 6);
            }
        }
        return bal;
    } catch (e) {
        console.error(`[SOLANA ERROR] -> ${walletAddr}:`, e);
        return 0;
    }
}

async function updateAllBalances() {
    const btn = document.getElementById("refreshBtn");
    if(btn) {
        btn.innerText = "⏳ 链上节点同步中...";
        btn.disabled = true;
    }

    const tasks = walletList.map(async (wallet) => {
        if (!wallet.balances) wallet.balances = {};
        const matchTokens = tokenConfigList.filter(t => t.chain === wallet.chain);
        
        for (let token of matchTokens) {
            let balance = 0;
            if (wallet.chain === "BSC") {
                // 严格保证原始 BSC 代码及路由路径未做任何变动
                balance = await queryEvmBalance(wallet.chain, wallet.address, token.contract, token.decimals);
            } else if (wallet.chain === "ETH") {
                balance = await queryEvmBalance(wallet.chain, wallet.address, token.contract, token.decimals);
            } else if (wallet.chain === "SOL") {
                balance = await querySolanaBalance(wallet.address, token.contract, token.decimals);
            }
            wallet.balances[token.symbol] = balance;
        }
    });

    await Promise.all(tasks);
    localStorage.setItem("cfg_wallets", JSON.stringify(walletList));
    renderUI();

    if(btn) {
        btn.innerText = "🔄 一键拉取实时链上余额";
        btn.disabled = false;
    }
}

// ==================== 5. 交互层与动态渲染 ====================
function addCustomToken() {
    const symbol = document.getElementById("newTokenSymbol").value.trim().toUpperCase();
    const chain = document.getElementById("newTokenChain").value;
    const contract = document.getElementById("newTokenContract").value.trim();
    const decimals = parseInt(document.getElementById("newTokenDecimals").value);

    if (!symbol || !contract) {
        alert("代币简称与合约/Mint地址不可为空！");
        return;
    }
    if (isNaN(decimals) || decimals < 0) {
        alert("请输入有效的代币精度数值！");
        return;
    }

    const exist = tokenConfigList.some(t => t.symbol === symbol && t.chain === chain && t.contract.toLowerCase() === contract.toLowerCase());
    if(exist) {
        alert("该代币资产已存在备查管理池中！");
        return;
    }

    tokenConfigList.push({ symbol, chain, contract, decimals });
    localStorage.setItem("cfg_tokens", JSON.stringify(tokenConfigList));
    
    rebuildTokenDropdown();
    renderUI();
    updateAllBalances();
}

function deleteCustomToken(idx) {
    if(confirm("移除该备查代币会导致对应监控停止，确认删除吗？")) {
        tokenConfigList.splice(idx, 1);
        localStorage.setItem("cfg_tokens", JSON.stringify(tokenConfigList));
        rebuildTokenDropdown();
        renderUI();
    }
}

function addWallet() {
    const address = document.getElementById("walletAddress").value.trim();
    const remark = document.getElementById("walletRemark").value.trim() || "未命名钱包";
    const chain = document.getElementById("walletChain").value;

    if (!address) {
        alert("地址栏不可为空！");
        return;
    }

    const exist = walletList.some(w => w.address.toLowerCase() === address.toLowerCase() && w.chain === chain);
    if(exist) {
        alert("当前网络的该钱包地址已存在于监控清单中！");
        return;
    }

    walletList.push({ chain, remark, address, balances: {} });
    localStorage.setItem("cfg_wallets", JSON.stringify(walletList));
    document.getElementById("walletAddress").value = "";
    document.getElementById("walletRemark").value = "";
    renderUI();
    updateAllBalances();
}

function deleteWallet(idx) {
    if(confirm("确认从列表中永久移出此监控钱包吗？")) {
        walletList.splice(idx, 1);
        localStorage.setItem("cfg_wallets", JSON.stringify(walletList));
        renderUI();
    }
}

function rebuildTokenDropdown() {
    const select = document.getElementById("selectDisplayToken");
    const uniqueSymbols = [...new Set(tokenConfigList.map(t => t.symbol))];
    const previousSelection = select.value;
    select.innerHTML = "";
    
    uniqueSymbols.forEach(sym => {
        select.innerHTML += `<option value="${sym}">🔍 观察查看 ${sym} 资产</option>`;
    });

    if(uniqueSymbols.includes(previousSelection)) {
        select.value = previousSelection;
    }
}

function renderUI() {
    const currentToken = document.getElementById("selectDisplayToken").value || "USDT";
    document.getElementById("dynamicTableHeader").innerText = `${currentToken} 余额`;

    // 渲染折叠面板内的自定义代币列表
    const tokenSlot = document.getElementById("customTokenListSlot");
    tokenSlot.innerHTML = "";
    tokenConfigList.forEach((t, i) => {
        tokenSlot.innerHTML += `
            <div class="token-item">
                <div class="token-item-info">
                    <h4>${t.symbol} <span class="chain-badge badge-${t.chain}">${t.chain}</span></h4>
                    <p>合约:${t.contract.substring(0,6)}...${t.contract.substring(t.contract.length-6)} (精度:${t.decimals})</p>
                </div>
                <button class="btn-danger" onclick="deleteCustomToken(${i})">删除</button>
            </div>
        `;
    });

    // 渲染左侧钱包清单明细
    const tbody = document.getElementById("walletTableBody");
    tbody.innerHTML = "";
    let totalAccumulator = 0;

    walletList.forEach((w, idx) => {
        let bal = parseFloat((w.balances && w.balances[currentToken]) || 0);
        totalAccumulator += bal;

        tbody.innerHTML += `
            <tr>
                <td class="index-cell">${idx + 1}</td>
                <td><span class="chain-badge badge-${w.chain}">${w.chain}</span></td>
                <td class="remark-cell">${w.remark}</td>
                <td class="address-cell">${w.address}</td>
                <td class="balance-cell">${bal.toLocaleString('zh-CN', {minimumFractionDigits: 0, maximumFractionDigits: 4})}</td>
                <td style="text-align: center;"><button class="btn-danger" onclick="deleteWallet(${idx})">删除</button></td>
            </tr>
        `;
    });

    document.getElementById("summary_total_display").innerText = totalAccumulator.toLocaleString('zh-CN', {minimumFractionDigits: 0, maximumFractionDigits: 4});
    document.getElementById("summary_wallet_count").innerText = walletList.length;
}

// ==================== 6. 自动化流程初始化运行 ====================
rebuildTokenDropdown();
renderUI();
updateAllBalances();
</script>
</body>
</html>
