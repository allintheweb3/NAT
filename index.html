<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>多链资产监控系统</title>
    <style>
        /* ==========================================
           1. 页面核心吸底布局 (PC & 手机端全自适应)
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }

        /* 整个网页最外层容器 */
        .page-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* 确保至少占满一屏高度 */
        }

        /* 上方业务内容包裹区：自动撑开，将 footer 压至最底部 */
        .content-wrap {
            flex: 1; 
            padding: 20px;
            /* 保持你原有的内部样式，这里只做无侵入包裹 */
        }

        /* 底部版权与使用数容器 */
        .footer-info {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            font-size: 14px;
            color: #718096;
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0;
        }

        .footer-info p {
            margin: 4px 0;
        }

        .count-num {
            font-weight: 600;
            color: #3182ce;
        }

        /* 手机端专项丝滑适配 */
        @media (max-width: 768px) {
            .content-wrap {
                padding: 12px;
            }
            .footer-info {
                font-size: 12px;
                padding: 12px 0;
                /* 关键：适配 iPhone 等全面屏底部的安全区域（小黑条） */
                padding-bottom: calc(12px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

    <!-- 【整体封装结构】 -->
    <div class="page-container">
        
        <!-- [上方内容区]：保留你原本的所有 HTML 元素，无需乱改 -->
        <div class="content-wrap">
            <!-- 示例：你原有的内容、标题、表格等写在这里 -->
            <h2>自定义代币监控</h2>
            <p>ETH / BNB 运行正常。正在检测并修复 SOL 原生币读取逻辑...</p>
            
            <!-- 你的资产数据表格/卡片可原封不动放在这里 -->
        </div>

        <!-- [底部吸底区]：完美适配 PC/手机，且内容超长时会自动随页面往下滚 -->
        <footer class="footer-info">
            <p>© 2026 资产监控系统. All Rights Reserved.</p>
            <p>系统累计安全运行：<span class="count-num">1,245</span> 次</p>
        </footer>

    </div>

    <!-- ==========================================
       2. Solana 原生币免破坏定向兼容封装
       ========================================== -->
    <script>
        /**
         * 封装的余额获取函数（无缝拦截并兼容原生 SOL）
         * @param {string} walletAddress 用户钱包地址
         * @param {string} mintAddress 后台配置的代币合约地址
         * @param {object} connection Solana的Rpc连接实例 (例如 new solanaWeb3.Connection(...))
         */
        async function safeGetSolanaBalance(walletAddress, mintAddress, connection) {
            // 定义 SOL 原生币的两种虚拟占位符情况（全面防漏）
            const NATIVE_SOL_MINTS = [
                "11111111111111111111111111111111",
                "So11111111111111111111111111111111111111112"
            ];

            try {
                // 定向拦截：如果是原生 SOL 占位符，不查 Token 账户，直接查主账户余额
                if (NATIVE_SOL_MINTS.includes(mintAddress.trim())) {
                    const publicKey = new solanaWeb3.PublicKey(walletAddress);
                    const lamports = await connection.getBalance(publicKey);
                    // 1 SOL = 10^9 Lamports (精度9)
                    return lamports / 1000000000; 
                }

                // -------------------------------------------------------------
                // 原有逻辑保持不动（以下为你原本没有问题的 Token 查询代码）
                // -------------------------------------------------------------
                // const tokenAccounts = await connection.getTokenAccountsByOwner(...);
                // return parseYourTokenBalance(tokenAccounts);
                
            } catch (error) {
                console.error("读取 Solana 余额失败:", error);
                return 0;
            }
        }
    </script>
</body>
</html>
