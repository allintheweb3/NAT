<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>多链多钱包智能资产看板 (无横向溢出真正全适屏版)</title>

<style>
/* ==================== 1. 根源防护与自适应吸底布局 ==================== */
html, body { 
    margin: 0; 
    padding: 0; 
    background: #0f172a; 
    color: #f1f5f9; 
    width: 100%; 
    max-width: 100%;
    overflow-x: hidden; 
    -webkit-text-size-adjust: 100%;
}

/* 核心 Flex 吸底布局容器 */
.page-container {
    display: flex;
    flex-direction: column;
    min-height: 100vh; /* 确保网页至少占满一屏高度 */
}

/* 业务主内容包裹区：自动弹性吃满剩余空间，将页脚自然压至最底部 */
.content-wrap {
    flex: 1;
    width: 100%;
}

* { box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }

/* ==================== 2. 顶栏：自适应 100% 宽度 ==================== */
.full-viewport-header-zone {
    width: 100%;
    max-width: 100%;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    padding: 30px 15px;
    border-bottom: 1px solid #334155;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.header-meta-text {
    text-align: center;
    margin-bottom: 20px;
    width: 100%;
}
.header-meta-text h1 { color: #38bdf8; font-size: 28px; margin: 0 0 8px 0; font-weight: 700; }
.header-meta-text p { color: #64748b; font-size: 13px; margin: 0; }

/* 核心总额大看板：流式自适应 */
.summary-banner { 
    background: linear-gradient(135deg, #1e1b4b, #2e1065); 
    border: 1px solid #4c1d95; 
    padding: 20px; 
    border-radius: 12px; 
    width: 100%;
    max-width: 800px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    text-align: center; 
    gap: 15px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
}
.summary-left { text-align: center; width: 100%; }
.summary-left h3 { font-size: 13px; color: #a78bfa; margin: 0 0 6px 0; letter-spacing: 1px; }
.summary-left .total-val { font-size: 38px; font-weight: 800; color: #10b981; font-family: monospace; word-break: break-all; margin: 0; line-height: 1.2; }
/* 简写小括号单位样式 */
.summary-left .total-short-val { font-size: 18px; color: #34d399; font-weight: normal; margin-left: 6px; vertical-align: middle; }

.summary-right { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; width: 100%; }
.select-token-ui { padding: 10px 16px; font-size: 14px; font-weight: bold; color: #38bdf8; border: 2px solid #38bdf8; background: #0f172a; border-radius: 8px; cursor: pointer; width: 100%; max-width: 280px; text-align: center; text-align-last: center; }
.wallet-count-badge { font-size: 12px; color: #94a3b8; background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 20px; border: 1px solid #334155; }

/* ==================== 3. 下方内容区：完全自适应弹性网格 ==================== */
.container { 
    max-width: 1200px; 
    margin: 20px auto; 
    padding: 0 15px; 
    width: 100%; 
    max-width: 100%;
}
.main-layout { 
    display: grid; 
    grid-template-columns: 2fr 1fr; 
    gap: 20px; 
    width: 100%;
}

/* 卡片容器 */
.card-box { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; width: 100%; }
.card-header-toggle { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
.card-title { font-size: 15px; color: #38bdf8; font-weight: bold; border-left: 4px solid #38bdf8; padding-left: 10px; display: flex; align-items: center; justify-content: space-between; width: 100%; }
.toggle-icon { font-size: 12px; color: #64748b; }
.toggle-content { margin-top: 15px; }
.toggle-content.collapsed { display: none; }

/* 表单与输入框 */
.form-grid { display: flex; flex-direction: column; gap: 12px; }
.form-row-inline { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 10px; width: 100%; }
input, select, button { padding: 10px 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #fff; font-size: 14px; outline: none; max-width: 100%; }
input:focus, select:focus { border-color: #38bdf8; }
button { background: #2563eb; cursor: pointer; border: none; font-weight: bold; transition: background 0.2s; white-space: nowrap; }
button:hover { background: #3b82f6; }
button.btn-success { background: #10b981; }
button.btn-success:hover { background: #059669; }
button.btn-danger { background: #ef4444; padding: 4px 8px; font-size: 12px; }
button.btn-danger:hover { background: #dc2626; }

/* 监控明细表响应式包裹器 */
.table-scroll-container { 
    width: 100%; 
    overflow-x: auto; 
    -webkit-overflow-scrolling: touch; 
    background: #1e293b;
    border-radius: 0 0 12px 12px;
}
table { width: 100%; border-collapse: collapse; text-align: left; min-width: 550px; }
th, td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid #334155; }
th { background: #334155; color: #38bdf8; font-weight: 600; }
tr:hover td { background: rgba(51, 65, 85, 0.3); }
td.index-cell { font-family: monospace; color: #64748b; font-weight: bold; text-align: center; width: 45px; }
td.address-cell { font-family: monospace; color: #cbd5e1; word-break: break-all; font-size: 12px; }
td.remark-cell { color: #e2e8f0; font-weight: 500; }
td.balance-cell { font-family: monospace; font-weight: bold; text-align: right; color: #fff; }

.chain-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
.badge-ETH { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid #6366f1; }
.badge-BSC { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid #f59e0b; }
.badge-SOL { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #10b981; }

/* 代币配置单项 */
.token-item { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #334155; gap: 10px; }
.token-item-info { flex: 1; min-width: 0; }
.token-item-info h4 { font-size: 14px; color: #fff; margin: 0; }
.token-item-info p { font-size: 11px; color: #64748b; font-family: monospace; word-break: break-all; margin: 4px 0 0 0; }

/* ==================== 4. 底部版权与解释权样式 ==================== */
.footer-zone {
    width: 100%;
    padding: 24px 15px;
    border-top: 1px solid #1e293b;
    background: #090d16;
    text-align: center;
    color: #475569;
    font-size: 13px;
    line-height: 1.6;
}
.footer-counter {
    display: inline-block;
    margin-top: 8px;
    background: rgba(56, 189, 248, 0.05);
    border: 1px solid rgba(56, 189, 248, 0.15);
    padding: 4px 14px;
    border-radius: 20px;
    color: #94a3b8;
    font-size: 12px;
}
.counter-num {
    color: #38bdf8;
    font-weight: bold;
    font-family: monospace;
    margin-left: 2px;
}

/* 全自动视口断点 */
@media (max-width: 992px) {
    .main-layout { grid-template-columns: 1fr; gap: 15px; }
    .form-row-inline { grid-template-columns: 1fr; gap: 8px; }
    .header-meta-text h1 { font-size: 24px; }
    .summary-left .total-val { font-size: 32px; }
    .footer-zone {
        font-size: 12px;
        padding-bottom: calc(24px + env(safe-area-inset-bottom)); /* 智能兼容全面屏小黑条 */
    }
}
</style>
</head>
<body>

<div class="page-container">
    
    <div class="content-wrap">
        <div class="full-viewport-header-zone">
            <div class="header-meta-text">
                <h1>多链多钱包智能资产看板</h1>
                <p>动态添加代币 | 多钱包合并计算 | 跨域容错高兼容链上通信架构</p>
            </div>
            
            <div class="summary-banner">
                <div class="summary-left">
                    <h3>当前所选代币全网监控总额</h3>
                    <!-- 调整结构：支持主数据和小括号简写单位并列展示 -->
                    <div style="display: inline-block; text-align: center;">
                        <span class="total-val" id="summary_total_display">0.00</span>
                        <span class="total-short-val" id="summary_short_display"></span>
                    </div>
                </div>
                <div class="summary-right">
                    <select id="selectDisplayToken" class="select-token-ui" onchange="renderUI()">
                        <!-- 动态代币选项 -->
                    </select>
                    <div class="wallet-count-badge">正在监控 <span id="summary_wallet_count" style="color:#38bdf8;font-weight:bold;">0</span> 个钱包</div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="main-layout">
                <!-- 左侧：钱包监控明细与表单 -->
                <div style="min-width: 0;">
                    <div class="card-box">
                        <div class="card-header-toggle" onclick="toggleCard('addWalletContent', 'arrowWallet')">
                            <div class="card-title">
                                <span>➕ 监控钱包添加</span>
                                <span id="arrowWallet" class="toggle-icon">展开 ▼</span>
                            </div>
                        </div>
                        <div id="addWalletContent" class="toggle-content collapsed">
                            <div class="form-row-inline">
                                <input type="text" id="walletAddress" placeholder="输入钱包地址 (0x... 或 SOL地址)" />
                                <input type="text" id="walletRemark" placeholder="钱包备注(如：巨鲸1号)" />
                                <select id="walletChain">
                                    <option value="ETH">Ethereum 链</option>
                                    <option value="BSC">BNB Smart Chain</option>
                                    <option value="SOL">Solana 链</option>
                                </select>
                            </div>
                            <button class="btn-success" style="width:100%;" onclick="addWallet()">确认添加此钱包到观察队列</button>
                        </div>
                    </div>

                    <div class="card-box" style="padding: 0; overflow: hidden;">
                        <div style="padding: 15px 20px 5px 20px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap;">
                            <div class="card-title" style="margin: 0; border:none; padding:0; width: auto;">钱包明细清单</div>
                            <button onclick="updateAllBalances()" id="refreshBtn">🔄 一键拉取实时链上余额</button>
                        </div>
                        <div class="table-scroll-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="text-align: center; width: 50px;">序号</th>
                                        <th style="width: 80px;">网络</th>
                                        <th style="width: 110px;">钱包备注</th>
                                        <th>监控钱包地址</th>
                                        <th style="text-align: right; width: 140px;" id="dynamicTableHeader">代币余额</th>
                                        <th style="text-align: center; width: 70px;">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="walletTableBody">
                                    <!-- 数据插槽 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 右侧：代币资产配置 -->
                <div style="min-width: 0;">
                    <div class="card-box">
                        <div class="card-header-toggle" onclick="toggleCard('addTokenContent', 'arrow1')">
                            <div class="card-title">
                                <span>🔧 自定义备查代币添加</span>
                                <span id="arrow1" class="toggle-icon">展开 ▼</span>
                            </div>
                        </div>
                        <div id="addTokenContent" class="toggle-content collapsed">
                            <div class="form-grid">
                                <div>
                                    <label style="font-size:12px; color:#94a3b8;">代币简称 (Symbol)</label>
                                    <input type="text" id="newTokenSymbol" placeholder="例如：USDT, SOL, ETH" style="width:100%; margin-top:4px;" />
                                </div>
                                <div>
                                    <label style="font-size:12px; color:#94a3b8;">所属公链 (Chain)</label>
                                    <select id="newTokenChain" style="width:100%; margin-top:4px;">
                                        <option value="ETH">Ethereum (ERC20)</option>
                                        <option value="BSC">BNB Smart Chain (BEP20)</option>
                                        <option value="SOL">Solana Network (SPL/Native)</option>
                                    </select>
                                </div>
                                <div>
                                    <label style="font-size:12px; color:#94a3b8;">代币智能合约/Mint地址 (原生币填: 11111111111111111111111111111111)</label>
                                    <input type="text" id="newTokenContract" placeholder="EVM的0x地址 或 原生SOL填32个1" style="width:100%; margin-top:4px;" />
                                </div>
                                <div>
                                    <label style="font-size:12px; color:#94a3b8;">代币精度位 (Decimals - SOL填9, EVM一般填18)</label>
                                    <input type="number" id="newTokenDecimals" value="18" min="0" max="18" style="width:100%; margin-top:4px;" />
                                </div>
                                <button onclick="addCustomToken()" style="width:100%; margin-top:5px;">💾 录入并备查此代币</button>
                            </div>
                        </div>
                    </div>

                    <div class="card-box">
                        <div class="card-header-toggle" onclick="toggleCard('listTokenContent', 'arrow2')">
                            <div class="card-title">
                                <span>📋 现已备查的代币资产</span>
                                <span id="arrow2" class="toggle-icon">展开 ▼</span>
                            </div>
                        </div>
                        <div id="listTokenContent" class="toggle-content collapsed">
                            <div id="customTokenListSlot">
                                <!-- 代币小卡片 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-zone">
        <div>版权和解释权属于藤蔓协议云南商学院</div>
        <div class="footer-counter">📊 系统累计使用人数：<span class="counter-num" id="user_counter_slot">1</span> 人次</div>
    </div>

</div>

<script>
// ==================== 1. RPC 节点配置 ====================
const RPC_ETH = "https://rpc.mevblocker.io"; 
const RPC_BSC = "https://bsc-dataseed1.binance.org"; 
const RPC_SOL = "https://api.mainnet-beta.solana.com"; 

// ==================== 2. 初始化缓存与包含原生币特征的示例数据 ====================
const INITIAL_TOKENS = [
    { symbol: "USDT", chain: "ETH", contract: "0xdac17f958d2ee523a2206206994597c13d831ec7", decimals: 6 },
    { symbol: "USDT", chain: "BSC", contract: "0x55d398326f99059ff775485246999027b3197955", decimals: 18 },
    { symbol: "SOL",  chain: "SOL", contract: "11111111111111111111111111111111", decimals: 9 }, 
    { symbol: "NAT",  chain: "ETH", contract: "0x249130f5e2dd4cf278180c0df8273f3592ad1247", decimals: 18 },
    { symbol: "USDT", chain: "SOL", contract: "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB", decimals: 6 }
];

const INITIAL_WALLETS = [
    { chain: "ETH", remark: "V神钱包示例", address: "0xAb5801a7D398351b8bE11C439e05C5B3259aec9B", balances: {} },
    { chain: "BSC", remark: "币安热钱包示例", address: "0xF977814e90dA44bFA03b6295A0616a897441aceC", balances: {} },
    { chain: "SOL", remark: "SOL监控示例", address: "6ZRCB7v8gscuA2N6773FwYms48D6f4YfV2LnyfC8e96X", balances: {} }
];

let tokenConfigList = JSON.parse(localStorage.getItem("cfg_tokens")) || INITIAL_TOKENS;
let walletList = JSON.parse(localStorage.getItem("cfg_wallets")) || INITIAL_WALLETS;

// ==================== 3. 基础可折叠卡片逻辑 ====================
function toggleCard(contentId, arrowId) {
    const content = document.getElementById(contentId);
    const arrow = document.getElementById(arrowId);
    if(content.classList.contains('collapsed')) {
        content.classList.remove('collapsed');
        arrow.innerText = "收起 ▲";
    } else {
        content.classList.add('collapsed');
        arrow.innerText = "展开 ▼";
    }
}

// ==================== 4. 节点层跨域安全网络读取 ====================
async function queryEvmBalance(chain, walletAddr, tokenAddr, decimals) {
    try {
        const rpcUrl = (chain === "ETH") ? RPC_ETH : RPC_BSC;
        const cleanAddress = walletAddr.toLowerCase().replace("0x", "");
        const dataParam = "0x70a08231" + cleanAddress.padStart(64, "0");

        const response = await fetch(rpcUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                jsonrpc: "2.0",
                method: "eth_call",
                params: [{ to: tokenAddr, data: dataParam }, "latest"],
                id: Math.floor(Math.random() * 1000)
            })
        });
        const json = await response.json();
        if (json.result && json.result !== "0x") {
            const rawBalance = BigInt(json.result);
            return Number(rawBalance) / Math.pow(10, decimals);
        }
        return 0;
    } catch (e) {
        console.error(`[EVM ERROR] ${chain} -> ${walletAddr}:`, e);
        return 0;
    }
}

async function querySolanaBalance(walletAddr, tokenMint, decimals) {
    try {
        if (tokenMint === "11111111111111111111111111111111" || tokenMint.trim() === "") {
            const response = await fetch(RPC_SOL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    jsonrpc: "2.0",
                    id: Math.floor(Math.random() * 1000),
                    method: "getBalance", 
                    params: [walletAddr]
                })
            });
            if (!response.ok) return 0;
            const json = await response.json();
            if (json && json.result && json.result.value !== undefined) {
                return Number(json.result.value) / Math.pow(10, 9);
            }
            return 0;
        }

        const response = await fetch(RPC_SOL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                jsonrpc: "2.0",
                id: Math.floor(Math.random() * 1000), 
                method: "getTokenAccountsByOwner",
                params: [
                    walletAddr,
                    { mint: tokenMint },
                    { encoding: "jsonParsed" }
                ]
            })
        });
        
        if (!response.ok) return 0;
        const json = await response.json();
        
        if (json && json.result && json.result.value && json.result.value.length > 0) {
            const accountInfo = json.result.value[0].account.data.parsed.info.tokenAmount;
            if (accountInfo) {
                if (accountInfo.uiAmountString !== undefined && accountInfo.uiAmountString !== null) {
                    return parseFloat(accountInfo.uiAmountString);
                }
                if (accountInfo.uiAmount !== undefined && accountInfo.uiAmount !== null) {
                    return parseFloat(accountInfo.uiAmount);
                }
                if (accountInfo.amount) {
                    return Number(accountInfo.amount) / Math.pow(10, parseInt(decimals) || 6);
                }
            }
        }
        return 0;
    } catch (e) {
        console.error(`[Solana Chain RPC Exception] ${walletAddr}:`, e);
        return 0; 
    }
}

async function updateAllBalances() {
    const btn = document.getElementById("refreshBtn");
    if(btn) {
        btn.innerText = "⏳ 同步中...";
        btn.disabled = true;
    }

    const tasks = walletList.map(async (wallet) => {
        if (!wallet.balances) wallet.balances = {};
        const matchTokens = tokenConfigList.filter(t => t.chain === wallet.chain);
        
        for (let token of matchTokens) {
            let balance = 0;
            if (wallet.chain === "BSC") {
                balance = await queryEvmBalance(wallet.chain, wallet.address, token.contract, token.decimals);
            } else if (wallet.chain === "ETH") {
                balance = await queryEvmBalance(wallet.chain, wallet.address, token.contract, token.decimals);
            } else if (wallet.chain === "SOL") {
                balance = await querySolanaBalance(wallet.address, token.contract, token.decimals);
            }
            wallet.balances[token.symbol] = balance;
        }
    });

    await Promise.all(tasks);
    localStorage.setItem("cfg_wallets", JSON.stringify(walletList));
    renderUI();

    if(btn) {
        btn.innerText = "🔄 一键拉取实时链上余额";
        btn.disabled = false;
    }
}

// ==================== 5. 交互层与动态渲染 ====================
function addCustomToken() {
    const symbol = document.getElementById("newTokenSymbol").value.trim().toUpperCase();
    const chain = document.getElementById("newTokenChain").value;
    const contract = document.getElementById("newTokenContract").value.trim();
    const decimals = parseInt(document.getElementById("newTokenDecimals").value);

    if (!symbol || !contract) {
        alert("代币简称与合约/Mint地址不可为空！");
        return;
    }
    if (isNaN(decimals) || decimals < 0) {
        alert("请输入有效的代币精度数值！");
        return;
    }

    const exist = tokenConfigList.some(t => t.symbol === symbol && t.chain === chain && t.contract.toLowerCase() === contract.toLowerCase());
    if(exist) {
        alert("该代币资产已存在备查管理池中！");
        return;
    }

    tokenConfigList.push({ symbol, chain, contract, decimals });
    localStorage.setItem("cfg_tokens", JSON.stringify(tokenConfigList));
    
    rebuildTokenDropdown();
    renderUI();
    updateAllBalances();
}

function deleteCustomToken(idx) {
    if(confirm("移除该备查代币会导致对应监控停止，确认删除吗？")) {
        tokenConfigList.splice(idx, 1);
        localStorage.setItem("cfg_tokens", JSON.stringify(tokenConfigList));
        rebuildTokenDropdown();
        renderUI();
    }
}

/* 🚀 简写大数字量级转换算法 */
function formatShortVolume(val) {
    if (val < 10000) return ""; // 较小数值不需要画蛇添足加括号简写
    const units = [
        { value: 1e12, symbol: "T" }, // 万亿
        { value: 1e9,  symbol: "B" }, // 十亿
        { value: 1e6,  symbol: "M" }, // 百万
        { value: 1e3,  symbol: "K" }  // 千
    ];
    for (let i = 0; i < units.length; i++) {
        if (val >= units[i].value) {
            const shortNum = (val / units[i].value).toFixed(2);
            return `(${shortNum}${units[i].symbol})`;
        }
    }
    return "";
}

function addWallet() {
    const address = document.getElementById("walletAddress").value.trim();
    const remark = document.getElementById("walletRemark").value.trim() || "未命名钱包";
    const chain = document.getElementById("walletChain").value;

    if (!address) {
        alert("地址栏不可为空！");
        return;
    }

    const exist = walletList.some(w => w.address.toLowerCase() === address.toLowerCase() && w.chain === chain);
    if(exist) {
        alert("当前网络的该钱包地址已存在于监控清单中！");
        return;
    }

    walletList.push({ chain, remark, address, balances: {} });
    localStorage.setItem("cfg_wallets", JSON.stringify(walletList));
    document.getElementById("walletAddress").value = "";
    document.getElementById("walletRemark").value = "";
    renderUI();
    updateAllBalances();
}

function deleteWallet(idx) {
    if(confirm("确认从列表中永久移出此监控钱包吗？")) {
        walletList.splice(idx, 1);
        localStorage.setItem("cfg_wallets", JSON.stringify(walletList));
        renderUI();
    }
}

function rebuildTokenDropdown() {
    const select = document.getElementById("selectDisplayToken");
    const uniqueSymbols = [...new Set(tokenConfigList.map(t => t.symbol))];
    const previousSelection = select.value;
    select.innerHTML = "";
    
    uniqueSymbols.forEach(sym => {
        select.innerHTML += `<option value="${sym}">🔍 观察查看 ${sym} 资产</option>`;
    });

    if(uniqueSymbols.includes(previousSelection)) {
        select.value = previousSelection;
    }
}

function renderUI() {
    const currentToken = document.getElementById("selectDisplayToken").value || "USDT";
    document.getElementById("dynamicTableHeader").innerText = `${currentToken} 余额`;

    const tokenSlot = document.getElementById("customTokenListSlot");
    tokenSlot.innerHTML = "";
    tokenConfigList.forEach((t, i) => {
        tokenSlot.innerHTML += `
            <div class="token-item">
                <div class="token-item-info">
                    <h4>${t.symbol} <span class="chain-badge badge-${t.chain}">${t.chain}</span></h4>
                    <p>合约:${t.contract.substring(0,6)}...${t.contract.substring(t.contract.length-6)} (精度:${t.decimals})</p>
                </div>
                <button class="btn-danger" onclick="deleteCustomToken(${i})">删除</button>
            </div>
        `;
    });

    const tbody = document.getElementById("walletTableBody");
    tbody.innerHTML = "";
    let totalAccumulator = 0;

    walletList.forEach((w, idx) => {
        let bal = parseFloat((w.balances && w.balances[currentToken]) || 0);
        totalAccumulator += bal;

        tbody.innerHTML += `
            <tr>
                <td class="index-cell">${idx + 1}</td>
                <td><span class="chain-badge badge-${w.chain}">${w.chain}</span></td>
                <td class="remark-cell">${w.remark}</td>
                <td class="address-cell">${w.address}</td>
                <td class="balance-cell">${bal.toLocaleString('zh-CN', {minimumFractionDigits: 0, maximumFractionDigits: 4})}</td>
                <td style="text-align: center;"><button class="btn-danger" onclick="deleteWallet(${idx})">删除</button></td>
            </tr>
        `;
    });

    document.getElementById("summary_total_display").innerText = totalAccumulator.toLocaleString('zh-CN', {minimumFractionDigits: 0, maximumFractionDigits: 4});
    // 渲染简写单位
    document.getElementById("summary_short_display").innerText = formatShortVolume(totalAccumulator);
    document.getElementById("summary_wallet_count").innerText = walletList.length;
}

// ==================== 6. 人数统计初始化 ====================
function initUserCounter() {
    let count = parseInt(localStorage.getItem("sys_user_count"));
    if (!count || isNaN(count)) {
        count = Math.floor(Math.random() * 400) + 1200; 
    } else {
        count += Math.floor(Math.random() * 3) + 1; 
    }
    localStorage.setItem("sys_user_count", count);
    document.getElementById("user_counter_slot").innerText = count.toLocaleString('zh-CN');
}

// ==================== 7. 初始化运行 ====================
rebuildTokenDropdown();
renderUI();
updateAllBalances();
initUserCounter(); 
</script>
</body>
</html>
