<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目国库 & 钱包明细管理</title>
    <style>
        /* ================= 1. 全局重置与基础变量 ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            line-height: 1.5;
            padding-bottom: 40px;
        }

        .main-container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 16px;
            position: relative;
        }

        /* ================= 2. 顶栏与 Header 区域 ================= */
        .full-viewport-header-zone {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            padding: 40px 20px 30px;
            border-radius: 0 0 16px 16px;
            margin-bottom: 24px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .lang-select-ui {
            position: absolute;
            top: 16px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }
        .lang-select-ui option {
            background: #1e293b;
            color: #fff;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header-meta-text {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* 核心指标卡片概览 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 8px;
        }

        .metric-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 20px;
            font-weight: 600;
            color: #38bdf8;
        }

        /* ================= 3. 表格卡片主体 ================= */
        .card-panel {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            margin-top: 16px;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
        }

        .table-responsive-wrapper {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            table-layout: fixed; /* 桌面端按固定比例设定 */
        }

        th, td {
            padding: 14px 12px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            color: #334155;
            vertical-align: middle;
        }

        th {
            background-color: #f8fafc;
            font-weight: 600;
            color: #64748b;
        }

        /* 桌面端列宽比例 */
        th:nth-child(1), td:nth-child(1) { width: 60px; text-align: center; } /* 序号 */
        th:nth-child(2), td:nth-child(2) { width: 90px; }  /* 网络 */
        th:nth-child(3), td:nth-child(3) { width: 240px; } /* 钱包地址 */
        th:nth-child(4), td:nth-child(4) { width: 140px; } /* 备注 */
        th:nth-child(5), td:nth-child(5) { width: 120px; text-align: right; } /* 余额 */

        /* ================= 4. 地址与交互组件 ================= */
        .address-inline-container {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            max-width: 100%;
        }

        .interactive-addr-link {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: #0284c7;
            text-decoration: none;
            font-weight: 500;
        }

        .interactive-addr-link:hover {
            text-decoration: underline;
        }

        .btn-mini-copy {
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            color: #475569;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-mini-copy:hover {
            background-color: #e2e8f0;
            color: #0f172a;
        }

        .remark-text-span {
            display: inline-block;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #64748b;
        }

        .badge-net {
            display: inline-block;
            padding: 2px 6px;
            background: #e0f2fe;
            color: #0369a1;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        /* ================= 5. 移动端适屏响应式 (关键修正) ================= */
        @media (max-width: 768px) {
            .full-viewport-header-zone {
                padding: 35px 12px 20px;
            }

            .lang-select-ui {
                top: 12px;
                right: 12px;
                padding: 4px 8px;
                font-size: 12px;
            }

            .header-title {
                font-size: 20px;
            }

            /* 1. 彻底取消表格硬性宽度和固定列宽，开启完全自适应 */
            table {
                min-width: 100% !important;
                table-layout: auto !important;
            }

            /* 2. 紧凑化单元格内边距 */
            th, td {
                padding: 10px 4px !important;
                font-size: 12px;
            }

            /* 3. 极简压缩序号和网络列，挤出宽度给地址 */
            th:nth-child(1), td:nth-child(1) { width: 28px !important; text-align: center; } 
            th:nth-child(2), td:nth-child(2) { width: 44px !important; } 

            .badge-net {
                padding: 1px 4px;
                font-size: 10px;
            }

            /* 4. 压缩备注名称宽度 */
            .remark-text-span {
                max-width: 50px !important;
            }

            /* 5. 彻底移除 CSS 的二次溢出截断，仅由 JS 控制“前4后4”全显 */
            .address-inline-container {
                gap: 3px;
            }

            .interactive-addr-link {
                max-width: none !important;
                display: inline !important;
                overflow: visible !important;
                white-space: nowrap;
                font-size: 12px;
            }

            .btn-mini-copy {
                padding: 0 4px;
                font-size: 10px;
                height: 18px;
                line-height: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- 全局头部与概览区 -->
    <header class="full-viewport-header-zone">
        <select class="lang-select-ui" id="langSelect">
            <option value="zh">简体中文</option>
            <option value="en">English</option>
        </select>
        <div class="main-container">
            <h1 class="header-title">项目国库资产看板</h1>
            <p class="header-meta-text">多签与质押挖矿钱包实时监控</p>
            
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">国库总资产 (USD)</div>
                    <div class="metric-value">$ 1,284,910.00</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">质押中的资产</div>
                    <div class="metric-value">$ 850,000.00</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">受监控钱包数</div>
                    <div class="metric-value" id="total-wallet-count">0</div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主体表格区 -->
    <main class="main-container">
        <div class="card-panel">
            <div class="card-header">
                <div class="card-title">钱包地址明细</div>
            </div>
            
            <div class="table-responsive-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>网络</th>
                            <th>钱包地址</th>
                            <th>备注</th>
                            <th style="text-align: right;">余额</th>
                        </tr>
                    </thead>
                    <tbody id="wallet-tbody">
                        <!-- JS 动态渲染 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // 模拟全局钱包列表数据
        const walletData = [
            { id: 1, chain: "TRX", address: "TFr2s3G9Xk8NmL1p4vQ7zW5yR0aCdB6eF9", remark: "主国库钱包", balance: "1,245,000.00 USDT" },
            { id: 2, chain: "ETH", address: "0x71C7656EC7ab88b098defB751B7401B5f6d8976F", remark: "7人多签节点", balance: "142.50 ETH" },
            { id: 3, chain: "BSC", address: "0x28C6c06298d514Db089934071355E5743bf21d60", remark: "质押收益池", balance: "89,050.00 BUSD" },
            { id: 4, chain: "SOL", address: "4k3Dyjzvzp8eMZWUXbBCjEvwSkkk59S5iCNLY3QrkX6R", remark: "流动性备用", balance: "1,200.00 SOL" }
        ];

        /**
         * 地址格式化：精确截断为前 4 位 + ... + 后 4 位
         */
        function formatAddress(addr) {
            if (!addr || addr.length <= 10) return addr;
            return `${addr.slice(0, 4)}...${addr.slice(-4)}`;
        }

        /**
         * 复制到剪贴板
         */
        function copyAddress(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const oldText = btn.innerText;
                btn.innerText = "已复制";
                btn.style.borderColor = "#22c55e";
                btn.style.color = "#15803d";

                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.style.borderColor = "";
                    btn.style.color = "";
                }, 1200);
            }).catch(err => {
                console.error("复制失败:", err);
            });
        }

        /**
         * 渲染整体表格与指标数据
         */
        function initDashboard() {
            // 更新顶部计数器
            document.getElementById("total-wallet-count").innerText = walletData.length;

            // 渲染表格
            const tbody = document.getElementById("wallet-tbody");
            tbody.innerHTML = "";

            walletData.forEach(item => {
                const tr = document.createElement("tr");

                const addressColumnHTML = `
                    <div class="address-inline-container">
                        <a href="javascript:void(0);" 
                           class="interactive-addr-link" 
                           title="${item.address}">
                           ${formatAddress(item.address)}
                        </a>
                        <button class="btn-mini-copy" onclick="copyAddress('${item.address}', this)">复制</button>
                    </div>
                `;

                tr.innerHTML = `
                    <td style="text-align: center;">${item.id}</td>
                    <td><span class="badge-net">${item.chain}</span></td>
                    <td>${addressColumnHTML}</td>
                    <td><span class="remark-text-span" title="${item.remark}">${item.remark}</span></td>
                    <td style="text-align: right; font-weight: 600;">${item.balance}</td>
                `;

                tbody.appendChild(tr);
            });
        }

        // 页面初始化
        document.addEventListener("DOMContentLoaded", initDashboard);
    </script>
</body>
</html>
