<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多钱包代币余额实时看板 (纯前端免服务器版)</title>
<script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.73.0/lib/index.iife.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
body { background: #0f172a; color: #f1f5f9; padding: 30px 15px; }
.container { max-width: 1000px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 30px; }
.header h1 { color: #38bdf8; font-size: 26px; margin-bottom: 10px; }
.header p { color: #64748b; font-size: 14px; }

/* 动态添加地址表单 */
.form-box { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 25px; display: grid; grid-template-columns: 2fr 1fr 120px; gap: 15px; }
input, select, button { padding: 10px 15px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #fff; font-size: 14px; outline: none; }
input:focus, select:focus { border-color: #38bdf8; }
button { background: #2563eb; cursor: pointer; border: none; font-weight: bold; transition: background 0.2s; }
button:hover { background: #3b82f6; }
button.btn-refresh { background: #10b981; grid-column: span 3; margin-top: 5px; }
button.btn-refresh:hover { background: #059669; }

/* 统计卡片 */
.total-banner { background: linear-gradient(135deg, #1e1b4b, #2e1065); border: 1px solid #4c1d95; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: flex; justify-content: space-around; text-align: center; }
.total-item h3 { font-size: 14px; color: #a78bfa; margin-bottom: 5px; }
.total-item p { font-size: 24px; font-weight: bold; color: #10b981; font-family: monospace; }

/* 数据表格 */
.table-box { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
table { width: 100%; border-collapse: collapse; text-align: left; }
th, td { padding: 14px 18px; font-size: 14px; border-bottom: 1px solid #334155; }
th { background: #334155; color: #38bdf8; font-weight: 600; }
tr:hover td { background: rgba(51, 65, 85, 0.4); }
td.address-cell { font-family: monospace; color: #cbd5e1; word-break: break-all; }
td.balance-cell { font-family: monospace; font-weight: bold; text-align: right; }
.chain-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
.badge-eth { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid #6366f1; }
.badge-bsc { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid #f59e0b; }
.badge-sol { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #10b981; }
.btn-delete { background: #ef4444; padding: 4px 10px; font-size: 12px; }
.btn-delete:hover { background: #dc2626; }

@media (max-width: 768px) {
    .form-box { grid-template-columns: 1fr; }
    button.btn-refresh { grid-column: span 1; }
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>多钱包代币余额智能看板</h1>
        <p>数据本地存储（LocalStorage） | 直连去中心化原生节点 | 安全无后端</p>
    </div>

    <div class="total-banner">
        <div class="total-item">
            <h3>TENDRIL 汇总</h3>
            <p id="summary_usdt">0.00</p>
        </div>
        <div class="total-item">
            <h3>NAT 汇总</h3>
            <p id="summary_nat">0.00</p>
        </div>
        <div class="total-item">
            <h3>管理钱包数</h3>
            <p id="summary_count" style="color: #38bdf8;">0</p>
        </div>
    </div>

    <div class="form-box">
        <input type="text" id="inputAddress" placeholder="粘贴或输入你要监控的钱包地址 (0x... 或 SOL地址)" />
        <select id="selectChain">
            <option value="ETH">Ethereum (ETH 链)</option>
            <option value="BSC">BNB Smart Chain (BSC 链)</option>
            <option value="SOL">Solana (SOL 链)</option>
        </select>
        <button onclick="addWallet()">➕ 添加地址</button>
        <button class="btn-refresh" onclick="updateAllBalances()">🔄 刷新全部链上余额</button>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>所属网络</th>
                    <th>监控钱包地址</th>
                    <th style="text-align: right;">TENDRIL 余额</th>
                    <th style="text-align: right;">NAT 余额</th>
                    <th style="text-align: center; width: 100px;">操作</th>
                </tr>
            </thead>
            <tbody id="walletTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
// ==================== 1. 区块链节点及代币智能合约配置 ====================
// 使用高可用、无需要Key的公共去中心化RPC节点
const RPC_ETH = "https://cloudflare-eth.com";
const RPC_BSC = "https://bsc-dataseed.binance.org";
const RPC_SOL = "https://api.mainnet-beta.solana.com";

// 代币智能合约（EVM 链）
const CONTRACT_USDT_ETH = "0xdac17f958d2ee523a2206206994597c13d831ec7"; 
const CONTRACT_TENDRIL_BSC = "0xb1afdfd850da168f2cc9f742e11cdda5273973d2";
const CONTRACT_NAT_ETH  = "0x249130F5E2dD4CF278180c0dF8273f3592Ad1247"; 
const CONTRACT_NAT_BSC  = "0x600e3b55d5368c32a94f9372563318adb6a3f882";
const CONTRACT_NAT_SOL  = "FbKRaqBzupLry3V7QujpNghwrHgxutB4MY11M8aeyVa1";

// 代币 Mint 地址（Solana 链）
const MINT_USDT_SOL = "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB"; 
const MINT_NAT_SOL  = "NaT5vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNAT"; // 请根据真实Mint替换

// 实例化原生 Web3 通信引擎
const web3Eth = new Web3(new Web3.providers.HttpProvider(RPC_ETH));
const web3Bsc = new Web3(new Web3.providers.HttpProvider(RPC_BSC));
const solanaConn = new solanaWeb3.Connection(RPC_SOL, 'confirmed');

// 极简 ERC20 标准查询 ABI
const MIN_ERC20_ABI = [{ "constant": true, "inputs": [{ "name": "_owner", "type": "address" }], "name": "balanceOf", "outputs": [{ "name": "balance", "type": "uint256" }], "type": "function" }];

// ==================== 2. 数据本地维护引擎 (零服务器依赖) ====================
// 默认内置几个观察钱包，防止初次打开版面空白
const DEFAULT_WALLETS = [
    { chain: "ETH", address: "0x65a177f0ce9ad38875aa309dae3fbb289c58f689", usdt: "0.00", nat: "0.00" },
    { chain: "BSC", address: "0x65a177f0ce9ad38875aa309dae3fbb289c58f689", usdt: "0.00", nat: "0.00" },
    { chain: "SOL", address: "J16N4uAQKXF7Y3fDgkowhVVBniFbW2fW4f7uKygau1y6", usdt: "0.00", nat: "0.00" }
];

let walletList = JSON.parse(localStorage.getItem("local_wallets")) || DEFAULT_WALLETS;

// ==================== 3. 核心链上数据直接调用逻辑 ====================

// 查询单条 EVM 链上资产
async function fetchEvmBalance(chain, address, tokenContract, decimals) {
    try {
        const web3Instance = (chain === "ETH") ? web3Eth : web3Bsc;
        const contract = new web3Instance.eth.Contract(MIN_ERC20_ABI, tokenContract);
        const rawBalance = await contract.methods.balanceOf(address).call();
        return parseFloat(rawBalance) / Math.pow(10, decimals);
    } catch (e) {
        console.error(`读取 ${chain} 钱包 ${address} 失败:`, e);
        return 0;
    }
}

// 查询 Solana 链上 SPL 资产
async function fetchSolanaBalance(address, targetMint) {
    try {
        const pubkey = new solanaWeb3.PublicKey(address);
        const tokenAccounts = await solanaConn.getParsedTokenAccountsByOwner(pubkey, {
            programId: new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA")
        });
        
        let balance = 0;
        tokenAccounts.value.forEach(acc => {
            const info = acc.account.data.parsed.info;
            if (info.mint === targetMint) {
                balance = info.tokenAmount.uiAmount || 0;
            }
        });
        return balance;
    } catch (e) {
        console.error(`读取 Solana 钱包 ${address} 失败:`, e);
        return 0;
    }
}

// 刷新全部钱包的链上余额
async function updateAllBalances() {
    const refreshBtn = document.querySelector(".btn-refresh");
    refreshBtn.innerText = "⏳ 正在直接调用区块链节点查询中...";
    refreshBtn.disabled = true;

    // 多链、多钱包高并发异步请求
    const promises = walletList.map(async (w) => {
        if (w.chain === "ETH") {
            w.usdt = await fetchEvmBalance("ETH", w.address, CONTRACT_USDT_ETH, 6);
            w.nat  = await fetchEvmBalance("ETH", w.address, CONTRACT_NAT_ETH, 18);
        } else if (w.chain === "BSC") {
            w.usdt = await fetchEvmBalance("BSC", w.address, CONTRACT_USDT_BSC, 18); // 依BSC部署规格除18
            w.nat  = await fetchEvmBalance("BSC", w.address, CONTRACT_NAT_BSC, 18);
        } else if (w.chain === "SOL") {
            w.usdt = await fetchSolanaBalance(w.address, MINT_USDT_SOL);
            w.nat  = await fetchSolanaBalance(w.address, MINT_NAT_SOL);
        }
    });

    await Promise.all(promises);
    saveAndRender();

    refreshBtn.innerText = "🔄 刷新全部链上余额";
    refreshBtn.disabled = false;
}

// ==================== 4. 前端交互与界面渲染引擎 ====================

function addWallet() {
    const addrInput = document.getElementById("inputAddress");
    const chainSelect = document.getElementById("selectChain");
    const address = addrInput.value.trim();
    const chain = chainSelect.value;

    if (!address) {
        alert("请输入有效的钱包地址！");
        return;
    }

    // 基础的 EVM 长度规则防呆
    if ((chain === "ETH" || chain === "BSC") && !address.startsWith("0x")) {
        alert("以太坊/BSC地址通常以 0x 开头");
        return;
    }

    // 查重
    const isExist = walletList.some(w => w.address.toLowerCase() === address.toLowerCase() && w.chain === chain);
    if (isExist) {
        alert("该钱包地址已在监控看板中！");
        return;
    }

    walletList.push({ chain, address, usdt: 0, nat: 0 });
    addrInput.value = "";
    saveAndRender();
    updateAllBalances(); // 添加后自动为新地址去查一次链上余额
}

function deleteWallet(index) {
    if(confirm("确定要删除对该钱包的监控吗？")) {
        walletList.splice(index, 1);
        saveAndRender();
    }
}

function saveAndRender() {
    // 同步到浏览器的 localStorage 缓存
    localStorage.setItem("local_wallets", JSON.stringify(walletList));

    const tbody = document.getElementById("walletTableBody");
    tbody.innerHTML = "";

    let totalUsdt = 0;
    let totalNat = 0;

    walletList.forEach((w, index) => {
        totalUsdt += parseFloat(w.usdt || 0);
        totalNat += parseFloat(w.nat || 0);

        const badgeClass = w.chain === "ETH" ? "badge-eth" : (w.chain === "BSC" ? "badge-bsc" : "badge-sol");
        
        tbody.innerHTML += `
            <tr>
                <td><span class="chain-badge ${badgeClass}">${w.chain}</span></td>
                <td class="address-cell">${w.address}</td>
                <td class="balance-cell" style="color: #e2e8f0;">${parseFloat(w.usdt).toLocaleString('zh-CN', {minimumFractionDigits:2})}</td>
                <td class="balance-cell" style="color: #38bdf8;">${parseFloat(w.nat).toLocaleString('zh-CN', {minimumFractionDigits:2})}</td>
                <td style="text-align: center;"><button class="btn-delete" onclick="deleteWallet(${index})">删除</button></td>
            </tr>
        `;
    });

    // 更新顶部的总池汇总
    document.getElementById("summary_usdt").innerText = totalUsdt.toLocaleString('zh-CN', {minimumFractionDigits:2});
    document.getElementById("summary_nat").innerText = totalNat.toLocaleString('zh-CN', {minimumFractionDigits:2});
    document.getElementById("summary_count").innerText = walletList.length;
}

// 页面初始化加载
saveAndRender();
updateAllBalances();
</script>

</body>
</html>
